name: Generate Backlog from Docs

# docs/ -> GitHub issues, with memory.
#
# A deterministic `detect` job hashes every doc and compares it against the
# committed state file (specs/backlog-state.json) so only NEW or CHANGED docs
# are processed. Claude then files issues for those docs, and `persist` records
# their hashes back into the state file. This makes the push trigger safe: a new
# or edited doc is picked up automatically and never re-filed once recorded.

on:
  workflow_dispatch:
    inputs:
      docs_path:
        description: "Docs folder to analyse."
        required: false
        type: string
        default: "docs"
      force:
        description: "Reprocess ALL docs, ignoring the memory/state file."
        required: false
        type: boolean
        default: false
      dry_run:
        description: "Analyse only — print issues instead of creating them (skips persist)."
        required: false
        type: boolean
        default: false
  # Auto-triggered on doc changes via docs-watch.yml, which re-dispatches this
  # workflow. (claude-code-action rejects `push` events, so we translate a docs
  # push into a workflow_dispatch instead of triggering on `push` directly.)

# Union of what the jobs below need; each job narrows it further.
# id-token: write is required by claude-code-action's OAuth (OIDC) flow.
permissions:
  contents: write
  issues: write
  id-token: write

concurrency:
  group: generate-backlog
  cancel-in-progress: false

jobs:
  # 1) Deterministic memory check: which docs are new or changed?
  detect:
    name: Detect changed docs
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
      any: ${{ steps.diff.outputs.any }}
    steps:
      - uses: actions/checkout@v4

      - name: Diff docs against state file
        id: diff
        env:
          DOCS: ${{ inputs.docs_path || 'docs' }}
          FORCE: ${{ inputs.force }}
          STATE: specs/backlog-state.json
        run: |
          [ -f "$STATE" ] || { mkdir -p "$(dirname "$STATE")"; echo '{}' > "$STATE"; }
          changed=""
          while IFS= read -r f; do
            h=$(sha256sum "$f" | cut -d' ' -f1)
            prev=$(jq -r --arg f "$f" '.[$f].sha256 // ""' "$STATE")
            if [ "$FORCE" = "true" ] || [ "$h" != "$prev" ]; then
              changed="$changed $f"
            fi
          done < <(find "$DOCS" -type f -name '*.md' | sort)
          changed="$(echo "$changed" | xargs)"
          echo "changed=$changed" >> "$GITHUB_OUTPUT"
          if [ -n "$changed" ]; then echo "any=true" >> "$GITHUB_OUTPUT"; else echo "any=false" >> "$GITHUB_OUTPUT"; fi
          echo "### Changed docs" >> "$GITHUB_STEP_SUMMARY"
          echo "${changed:-(none)}" >> "$GITHUB_STEP_SUMMARY"

  # 2) Turn the changed docs into issues (reusable Claude runner).
  backlog:
    name: Docs → Issues
    needs: detect
    if: needs.detect.outputs.any == 'true'
    uses: ./.github/workflows/reusable-claude.yml
    permissions:
      contents: read
      issues: write
      id-token: write
    with:
      claude_args: |
        --max-turns 25
        --model claude-sonnet-4-6
        --allowedTools Read,Glob,Grep,Bash(gh:*)
      prompt: |
        You are the backlog generator. Turn the CHANGED docs below into a GitHub
        issue backlog that the auto-maintain workflow can implement.

        Changed docs to process (ONLY these): ${{ needs.detect.outputs.changed }}

        Steps:
        1. Read each changed doc listed above. It is the source of truth. Note
           capabilities tagged "Planned" vs "Implemented".
        2. Read the Rust source under `src/` to confirm what already exists.
        3. Run `gh issue list --state all --limit 200` and read the titles so you
           DO NOT create duplicates (match on the capability, not exact wording).
        4. Ensure labels exist:
           `gh label create spec --color 0e8a16 --force` and
           `gh label create auto-maintain --color 1d76db --force`.
        5. For each "Planned" capability in the changed docs with no matching
           issue, create ONE small, independently-implementable issue:
             - Title: a concise imperative spec (e.g. "Add retry policy to tools").
             - Body: MUST use this constant structure so every issue is consistent:
                 * "## Behaviour" — what it should do (from the doc).
                 * "## Acceptance criteria" — a checklist adapted from the doc.
                 * "## How to build it" — the constant standard, verbatim:
                     "Follow CLAUDE.md. Work test-first (TDD): write failing tests,
                      then implement. Before opening the PR, `cargo fmt --all`,
                      `cargo build --all-targets`, `cargo clippy --all-targets -- -D warnings`
                      and `cargo test --all-targets` must all pass. Flip this
                      capability 🚧→✅ in docs/02-agent-harness.md in the same PR."
                 * "## Source" — the doc section (e.g. "docs/02 · C6").
             - Labels: `spec` and `auto-maintain` (`gh issue create ... --label spec --label auto-maintain`).
        6. If "${{ inputs.dry_run }}" is "true": DO NOT create anything — print the
           issues you would create and stop.

        Keep issues small and their bodies consistent. Do not modify any files.
    secrets: inherit

  # 3) Record the processed docs' hashes so they are not re-filed next time.
  persist:
    name: Persist backlog state
    needs: [detect, backlog]
    if: needs.detect.outputs.any == 'true' && inputs.dry_run != true
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Update and commit state file
        env:
          CHANGED: ${{ needs.detect.outputs.changed }}
          STATE: specs/backlog-state.json
          TRIGGER: ${{ github.event_name }}
        run: |
          [ -f "$STATE" ] || { mkdir -p "$(dirname "$STATE")"; echo '{}' > "$STATE"; }
          ts="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          tmp="$(mktemp)"
          for f in $CHANGED; do
            h=$(sha256sum "$f" | cut -d' ' -f1)
            jq --arg f "$f" --arg h "$h" --arg ts "$ts" --arg tr "$TRIGGER" \
               '.[$f] = {sha256: $h, processed_at: $ts, trigger: $tr}' "$STATE" > "$tmp"
            mv "$tmp" "$STATE"
          done
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$STATE"
          if git diff --cached --quiet; then
            echo "No state change."
          else
            git commit -m "chore(backlog): record processed docs [skip ci]"
            git push
          fi

  # Single outcome notification (only when there was work to do).
  notify:
    name: Notify outcome
    needs: [detect, backlog, persist]
    if: always() && needs.detect.outputs.any == 'true'
    uses: ./.github/workflows/reusable-notify.yml
    with:
      status: ${{ needs.backlog.result == 'success' && 'success' || 'failure' }}
      context: "Backlog generation"
      success_message: "Processed changed docs and updated the issue backlog + state file."
      failure_message: "generate-backlog failed. Check the workflow run logs."
    secrets: inherit
