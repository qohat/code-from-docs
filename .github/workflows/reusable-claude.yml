name: Reusable · Claude Code Runner

# Reusable building block: checks out the repo and runs Claude Code headlessly.
# The prompt can be inline (`prompt`) or, preferably, read from an editable file
# (`prompt_file`) with `$VAR` placeholders substituted from `session_env`.
# When `work_branch` is set, ALL git plumbing is deterministic (runner, no AI
# cost): it bases the branch on the latest `base_ref` before the session, then
# formats, commits, pushes and (with open_pr) opens the PR using GH_PAT so CI
# fires. Claude only edits + validates. Invoke with `uses:` + `secrets: inherit`.

on:
  workflow_call:
    inputs:
      prompt:
        description: "Inline prompt. Prefer prompt_file for anything non-trivial."
        required: false
        type: string
        default: ""
      prompt_file:
        description: "Path to a file whose contents are used as the prompt (takes precedence over prompt). Keeps long prompts out of YAML."
        required: false
        type: string
        default: ""
      session_env:
        description: "Extra KEY=VALUE lines (one per line) exported into the Claude session's environment, e.g. ISSUE_NUMBER=42. Referenced from the prompt file as $KEY."
        required: false
        type: string
        default: ""
      claude_args:
        description: "Extra Claude Code CLI args (newline-separated)."
        required: false
        type: string
        default: ""
      checkout_ref:
        description: "Git ref to check out (defaults to the triggering ref)."
        required: false
        type: string
        default: ""
      base_ref:
        description: "Base branch to start work from (with work_branch). Deterministic 'always start from main'."
        required: false
        type: string
        default: ""
      work_branch:
        description: "If set, the runner bases this branch on origin/base_ref BEFORE the session, then (after Claude edits) formats, commits, pushes and — with open_pr — opens the PR. All git plumbing is deterministic (no AI cost)."
        required: false
        type: string
        default: ""
      format_cmd:
        description: "Formatter run in the runner before committing, e.g. 'cargo fmt --all'."
        required: false
        type: string
        default: ""
      commit_message:
        description: "Commit message for the runner-made commit on work_branch."
        required: false
        type: string
        default: "auto-maintain: implement change"
      open_pr:
        description: "If true (with work_branch), the runner opens/reuses a PR using GH_PAT so the PR triggers ci.yml (the Actions token cannot create PRs, and its PRs would not trigger CI)."
        required: false
        type: boolean
        default: false
      pr_base:
        description: "Base branch for the PR (defaults to base_ref, then main)."
        required: false
        type: string
        default: ""
      pr_title:
        description: "Title for the opened PR."
        required: false
        type: string
        default: ""
      pr_body:
        description: "Body for the opened PR."
        required: false
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      GH_PAT:
        description: "Fine-grained PAT (contents + pull-requests write) used to push and open PRs so ci.yml is triggered. Falls back to GITHUB_TOKEN for push if absent."
        required: false
    outputs:
      cost_usd:
        description: "Total USD cost of the Claude session."
        value: ${{ jobs.claude.outputs.cost_usd }}
      num_turns:
        description: "Number of turns the Claude session took."
        value: ${{ jobs.claude.outputs.num_turns }}
      pr_number:
        description: "PR number opened/reused for work_branch (when open_pr is set)."
        value: ${{ jobs.claude.outputs.pr_number }}

jobs:
  claude:
    name: Run Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No permissions block here on purpose: a reusable workflow that requests
    # MORE than the caller granted fails the whole run at startup. Instead this
    # job inherits whatever the calling workflow grants, so each caller keeps
    # its own least-privilege `permissions:` (backlog = issues only;
    # auto-maintain = contents/issues/PR write).
    outputs:
      cost_usd: ${{ steps.cost.outputs.cost_usd }}
      num_turns: ${{ steps.cost.outputs.num_turns }}
      pr_number: ${{ steps.pr.outputs.pr_number }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Deterministic "start from main": base the work branch on the latest
      # base_ref so the model never spends turns (or money) on git plumbing.
      - name: Prepare work branch
        if: inputs.work_branch != ''
        env:
          BASE_REF: ${{ inputs.base_ref }}
          WORK_BRANCH: ${{ inputs.work_branch }}
        run: |
          base="${BASE_REF:-main}"
          git fetch origin "$base"
          git checkout -B "$WORK_BRANCH" "origin/$base"

      # Load the prompt from a file (if given) and export any session env vars,
      # so long prompts live in an editable text file instead of inline YAML.
      - name: Resolve prompt and session env
        id: prep
        env:
          PROMPT_FILE: ${{ inputs.prompt_file }}
          SESSION_ENV: ${{ inputs.session_env }}
        run: |
          # Export caller vars for (a) the Claude step process (GITHUB_ENV) and
          # (b) this shell, and collect their names so we only substitute those.
          varlist=""
          if [ -n "$SESSION_ENV" ]; then
            printf '%s\n' "$SESSION_ENV" >> "$GITHUB_ENV"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              key="${line%%=*}"
              val="${line#*=}"
              export "$key"="$val"
              varlist="$varlist \${$key}"
            done < <(printf '%s\n' "$SESSION_ENV")
          fi
          if [ -n "$PROMPT_FILE" ]; then
            [ -f "$PROMPT_FILE" ] || { echo "::error::prompt_file not found: $PROMPT_FILE"; exit 1; }
            # Substitute ONLY the session vars (leave any other $ untouched).
            content=$(envsubst "$varlist" < "$PROMPT_FILE")
            {
              echo 'text<<CLAUDE_PROMPT_EOF'
              printf '%s\n' "$content"
              echo 'CLAUDE_PROMPT_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ inputs.prompt_file != '' && steps.prep.outputs.text || inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}
          # Allow bot-initiated runs: docs-watch dispatches generate-backlog as
          # the github-actions bot, which the action blocks unless listed here.
          allowed_bots: "*"

      - name: Extract session cost
        id: cost
        if: always()
        run: |
          # The action writes a JSON log with a "result" event holding the cost.
          f="${{ steps.claude.outputs.execution_file }}"
          [ -n "$f" ] && [ -f "$f" ] || f="$RUNNER_TEMP/claude-execution-output.json"
          cost=0
          turns=0
          if [ -f "$f" ]; then
            # Works whether the file is a JSON array or a stream of JSON objects.
            cost=$(jq -r '.. | objects | select(.type? == "result") | .total_cost_usd // empty' "$f" 2>/dev/null | tail -1)
            turns=$(jq -r '.. | objects | select(.type? == "result") | .num_turns // empty' "$f" 2>/dev/null | tail -1)
          fi
          echo "cost_usd=${cost:-0}" >> "$GITHUB_OUTPUT"
          echo "num_turns=${turns:-0}" >> "$GITHUB_OUTPUT"
          echo "Claude session cost: \$${cost:-0} (${turns:-0} turns)" >> "$GITHUB_STEP_SUMMARY"

      # Deterministic git: format Claude's edits, commit and push. Uses GH_PAT so
      # the branch/PR are attributed to a real user (needed for CI to trigger);
      # falls back to GITHUB_TOKEN for the push if no PAT is configured.
      - name: Format, commit and push work branch
        if: success() && inputs.work_branch != ''
        env:
          WORK_BRANCH: ${{ inputs.work_branch }}
          FORMAT_CMD: ${{ inputs.format_cmd }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
          GIT_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || github.token }}
        run: |
          if [ -n "$FORMAT_CMD" ]; then
            echo "Running formatter: $FORMAT_CMD"
            eval "$FORMAT_CMD"
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "::warning::Claude produced no changes — nothing to commit."
            exit 0
          fi
          git commit -m "$COMMIT_MESSAGE"
          git push --force \
            "https://x-access-token:${GIT_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "HEAD:refs/heads/${WORK_BRANCH}"

      # Open (or reuse) the PR with GH_PAT so ci.yml runs on it. No AI cost.
      - name: Open or reuse pull request
        id: pr
        if: success() && inputs.open_pr && inputs.work_branch != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          WORK_BRANCH: ${{ inputs.work_branch }}
          PR_BASE: ${{ inputs.pr_base }}
          BASE_REF: ${{ inputs.base_ref }}
          PR_TITLE: ${{ inputs.pr_title }}
          PR_BODY: ${{ inputs.pr_body }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "::error::open_pr requires the GH_PAT secret (Actions token cannot create PRs)."
            exit 1
          fi
          base="${PR_BASE:-${BASE_REF:-main}}"
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$WORK_BRANCH" --state open \
                 --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$pr" ]; then
            gh pr create --repo "$GITHUB_REPOSITORY" --base "$base" --head "$WORK_BRANCH" \
              --title "${PR_TITLE:-$WORK_BRANCH}" --body "${PR_BODY:-Opened by auto-maintain.}"
            pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$WORK_BRANCH" --state open \
                   --json number --jq '.[0].number')
          fi
          echo "pr_number=${pr}" >> "$GITHUB_OUTPUT"
          echo "PR for ${WORK_BRANCH}: #${pr:-<none>}" >> "$GITHUB_STEP_SUMMARY"
