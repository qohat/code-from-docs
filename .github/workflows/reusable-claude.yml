name: Reusable · Claude Code Runner

# Reusable building block: checks out the repo and runs Claude Code headlessly.
# The prompt can be inline (`prompt`) or, preferably, read from an editable file
# (`prompt_file`) with `$VAR` placeholders substituted from `session_env`.
# When `work_branch` is set, the runner deterministically bases it on the latest
# `base_ref` BEFORE the session (so Claude starts from main without spending
# turns on it); Claude then commits/pushes/opens the PR itself. Auth is an OAuth
# token passed as a secret. Invoke with `uses:` + `secrets: inherit`.

on:
  workflow_call:
    inputs:
      prompt:
        description: "Inline prompt. Prefer prompt_file for anything non-trivial."
        required: false
        type: string
        default: ""
      prompt_file:
        description: "Path to a file whose contents are used as the prompt (takes precedence over prompt). Keeps long prompts out of YAML."
        required: false
        type: string
        default: ""
      session_env:
        description: "Extra KEY=VALUE lines (one per line) exported into the Claude session's environment, e.g. ISSUE_NUMBER=42. Referenced from the prompt file as $KEY."
        required: false
        type: string
        default: ""
      claude_args:
        description: "Extra Claude Code CLI args (newline-separated)."
        required: false
        type: string
        default: ""
      checkout_ref:
        description: "Git ref to check out (defaults to the triggering ref)."
        required: false
        type: string
        default: ""
      base_ref:
        description: "Base branch to start work from (with work_branch). Deterministic 'always start from main'."
        required: false
        type: string
        default: ""
      work_branch:
        description: "If set, the runner creates this branch from origin/base_ref BEFORE Claude runs, so the session starts from the latest main. Claude then commits, pushes and opens the PR itself (its app token can create PRs and trigger CI; GITHUB_TOKEN cannot)."
        required: false
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
    outputs:
      cost_usd:
        description: "Total USD cost of the Claude session."
        value: ${{ jobs.claude.outputs.cost_usd }}
      num_turns:
        description: "Number of turns the Claude session took."
        value: ${{ jobs.claude.outputs.num_turns }}

jobs:
  claude:
    name: Run Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No permissions block here on purpose: a reusable workflow that requests
    # MORE than the caller granted fails the whole run at startup. Instead this
    # job inherits whatever the calling workflow grants, so each caller keeps
    # its own least-privilege `permissions:` (backlog = issues only;
    # auto-maintain = contents/issues/PR write).
    outputs:
      cost_usd: ${{ steps.cost.outputs.cost_usd }}
      num_turns: ${{ steps.cost.outputs.num_turns }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Deterministic "start from main": base the work branch on the latest
      # base_ref so the model never spends turns (or money) on git plumbing.
      - name: Prepare work branch
        if: inputs.work_branch != ''
        env:
          BASE_REF: ${{ inputs.base_ref }}
          WORK_BRANCH: ${{ inputs.work_branch }}
        run: |
          base="${BASE_REF:-main}"
          git fetch origin "$base"
          git checkout -B "$WORK_BRANCH" "origin/$base"

      # Load the prompt from a file (if given) and export any session env vars,
      # so long prompts live in an editable text file instead of inline YAML.
      - name: Resolve prompt and session env
        id: prep
        env:
          PROMPT_FILE: ${{ inputs.prompt_file }}
          SESSION_ENV: ${{ inputs.session_env }}
        run: |
          # Export caller vars for (a) the Claude step process (GITHUB_ENV) and
          # (b) this shell, and collect their names so we only substitute those.
          varlist=""
          if [ -n "$SESSION_ENV" ]; then
            printf '%s\n' "$SESSION_ENV" >> "$GITHUB_ENV"
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              key="${line%%=*}"
              val="${line#*=}"
              export "$key"="$val"
              varlist="$varlist \${$key}"
            done < <(printf '%s\n' "$SESSION_ENV")
          fi
          if [ -n "$PROMPT_FILE" ]; then
            [ -f "$PROMPT_FILE" ] || { echo "::error::prompt_file not found: $PROMPT_FILE"; exit 1; }
            # Substitute ONLY the session vars (leave any other $ untouched).
            content=$(envsubst "$varlist" < "$PROMPT_FILE")
            {
              echo 'text<<CLAUDE_PROMPT_EOF'
              printf '%s\n' "$content"
              echo 'CLAUDE_PROMPT_EOF'
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ inputs.prompt_file != '' && steps.prep.outputs.text || inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}
          # Allow bot-initiated runs: docs-watch dispatches generate-backlog as
          # the github-actions bot, which the action blocks unless listed here.
          allowed_bots: "*"

      - name: Extract session cost
        id: cost
        if: always()
        run: |
          # The action writes a JSON log with a "result" event holding the cost.
          f="${{ steps.claude.outputs.execution_file }}"
          [ -n "$f" ] && [ -f "$f" ] || f="$RUNNER_TEMP/claude-execution-output.json"
          cost=0
          turns=0
          if [ -f "$f" ]; then
            # Works whether the file is a JSON array or a stream of JSON objects.
            cost=$(jq -r '.. | objects | select(.type? == "result") | .total_cost_usd // empty' "$f" 2>/dev/null | tail -1)
            turns=$(jq -r '.. | objects | select(.type? == "result") | .num_turns // empty' "$f" 2>/dev/null | tail -1)
          fi
          echo "cost_usd=${cost:-0}" >> "$GITHUB_OUTPUT"
          echo "num_turns=${turns:-0}" >> "$GITHUB_OUTPUT"
          echo "Claude session cost: \$${cost:-0} (${turns:-0} turns)" >> "$GITHUB_STEP_SUMMARY"
