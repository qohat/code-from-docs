name: Reusable · Claude Code Runner

# Reusable building block: checks out the repo and runs Claude Code headlessly
# with a caller-supplied prompt. Auth is via an OAuth token passed as a secret,
# never hard-coded. Callers invoke this with `uses:` + `secrets: inherit`.

on:
  workflow_call:
    inputs:
      prompt:
        description: "Headless task prompt for Claude Code."
        required: true
        type: string
      claude_args:
        description: "Extra Claude Code CLI args (newline-separated)."
        required: false
        type: string
        default: ""
      checkout_ref:
        description: "Git ref to check out (defaults to the triggering ref)."
        required: false
        type: string
        default: ""
      base_ref:
        description: "Base branch to start work from (with work_branch). Deterministic 'always start from main'."
        required: false
        type: string
        default: ""
      work_branch:
        description: "If set, the runner creates this branch from origin/base_ref BEFORE Claude, and commits + pushes it AFTER. Claude only edits files."
        required: false
        type: string
        default: ""
      format_cmd:
        description: "Formatter to run (in the runner, not the model) before committing, e.g. 'cargo fmt --all'."
        required: false
        type: string
        default: ""
      commit_message:
        description: "Commit message for the runner-made commit on work_branch."
        required: false
        type: string
        default: "auto-maintain: implement change"
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
    outputs:
      cost_usd:
        description: "Total USD cost of the Claude session."
        value: ${{ jobs.claude.outputs.cost_usd }}
      num_turns:
        description: "Number of turns the Claude session took."
        value: ${{ jobs.claude.outputs.num_turns }}

jobs:
  claude:
    name: Run Claude Code
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # No permissions block here on purpose: a reusable workflow that requests
    # MORE than the caller granted fails the whole run at startup. Instead this
    # job inherits whatever the calling workflow grants, so each caller keeps
    # its own least-privilege `permissions:` (backlog = issues only;
    # auto-maintain = contents/issues/PR write).
    outputs:
      cost_usd: ${{ steps.cost.outputs.cost_usd }}
      num_turns: ${{ steps.cost.outputs.num_turns }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Deterministic "start from main": base the work branch on the latest
      # base_ref so the model never spends turns (or money) on git plumbing.
      - name: Prepare work branch
        if: inputs.work_branch != ''
        env:
          BASE_REF: ${{ inputs.base_ref }}
          WORK_BRANCH: ${{ inputs.work_branch }}
        run: |
          base="${BASE_REF:-main}"
          git fetch origin "$base"
          git checkout -B "$WORK_BRANCH" "origin/$base"

      - name: Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ inputs.prompt }}
          claude_args: ${{ inputs.claude_args }}
          # Allow bot-initiated runs: docs-watch dispatches generate-backlog as
          # the github-actions bot, which the action blocks unless listed here.
          allowed_bots: "*"

      - name: Extract session cost
        id: cost
        if: always()
        run: |
          # The action writes a JSON log with a "result" event holding the cost.
          f="${{ steps.claude.outputs.execution_file }}"
          [ -n "$f" ] && [ -f "$f" ] || f="$RUNNER_TEMP/claude-execution-output.json"
          cost=0
          turns=0
          if [ -f "$f" ]; then
            # Works whether the file is a JSON array or a stream of JSON objects.
            cost=$(jq -r '.. | objects | select(.type? == "result") | .total_cost_usd // empty' "$f" 2>/dev/null | tail -1)
            turns=$(jq -r '.. | objects | select(.type? == "result") | .num_turns // empty' "$f" 2>/dev/null | tail -1)
          fi
          echo "cost_usd=${cost:-0}" >> "$GITHUB_OUTPUT"
          echo "num_turns=${turns:-0}" >> "$GITHUB_OUTPUT"
          echo "Claude session cost: \$${cost:-0} (${turns:-0} turns)" >> "$GITHUB_STEP_SUMMARY"

      # Deterministic formatting + commit + push (runner, not the model). This is
      # why in-session formatting was unreliable: enforce it here instead.
      - name: Format, commit and push work branch
        if: success() && inputs.work_branch != ''
        env:
          WORK_BRANCH: ${{ inputs.work_branch }}
          FORMAT_CMD: ${{ inputs.format_cmd }}
          COMMIT_MESSAGE: ${{ inputs.commit_message }}
        run: |
          if [ -n "$FORMAT_CMD" ]; then
            echo "Running formatter: $FORMAT_CMD"
            eval "$FORMAT_CMD"
          fi
          git add -A
          if git diff --cached --quiet; then
            echo "::warning::Claude produced no changes — nothing to commit."
          else
            git commit -m "$COMMIT_MESSAGE"
            git push --force origin "$WORK_BRANCH"
          fi
