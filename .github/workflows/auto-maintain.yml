name: Auto-Maintain (Issue → PR)

# GitHub issue -> pull request.
# Triggered when an issue is labelled `auto-maintain` (or dispatched manually).
# Claude implements the issue on a branch and opens a PR. Nothing merges here.

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to implement."
        required: true
        type: string

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write # required by claude-code-action's OAuth (OIDC) flow

# One implementation run per issue at a time.
concurrency:
  group: auto-maintain-${{ github.event.issue.number || inputs.issue_number }}
  cancel-in-progress: false

jobs:
  # Claude ONLY edits code + tests. The runner (reusable-claude) deterministically
  # branches from main, formats, commits and pushes — no AI cost for git plumbing.
  implement:
    name: Implement issue
    # Manual dispatch, or the moment the `auto-maintain` label is added.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'auto-maintain'
    uses: ./.github/workflows/reusable-claude.yml
    permissions:
      contents: write # push the work branch
      issues: read # read the issue
      id-token: write # claude-code-action OAuth (OIDC)
    with:
      base_ref: main
      work_branch: auto/issue-${{ github.event.issue.number || inputs.issue_number }}
      format_cmd: cargo fmt --all
      commit_message: "auto-maintain: implement #${{ github.event.issue.number || inputs.issue_number }}"
      # The prompt lives in an editable text file — see .github/prompts/. The
      # only dynamic value (issue number) is injected via session_env.
      prompt_file: .github/prompts/implement-issue.md
      session_env: |
        ISSUE_NUMBER=${{ github.event.issue.number || inputs.issue_number }}
      claude_args: |
        --max-turns 40
        --model claude-sonnet-4-6
        --allowedTools Read,Glob,Grep,Edit,Write,Bash(cargo:*),Bash(gh:*)
    secrets: inherit

  # Deterministically open (or reuse) the PR for the pushed branch — via gh, no AI.
  open-pr:
    name: Open pull request
    needs: implement
    if: success()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      issues: read
      pull-requests: write
    outputs:
      pr: ${{ steps.pr.outputs.pr }}
    steps:
      - uses: actions/checkout@v4
      - name: Create or reuse PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          N: ${{ github.event.issue.number || inputs.issue_number }}
        run: |
          branch="auto/issue-${N}"
          pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open \
                 --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -z "$pr" ]; then
            title=$(gh issue view "$N" --repo "$GITHUB_REPOSITORY" --json title --jq .title)
            body=$(printf 'Closes #%s\n\nImplemented by auto-maintain: branched from main, built test-first, formatted deterministically. Review before merge.' "$N")
            gh pr create --repo "$GITHUB_REPOSITORY" --base main --head "$branch" \
              --title "$title" --body "$body"
            pr=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$branch" --state open \
                   --json number --jq '.[0].number')
          fi
          echo "pr=${pr}" >> "$GITHUB_OUTPUT"
          echo "PR for ${branch}: #${pr:-<none>}" >> "$GITHUB_STEP_SUMMARY"

  # Report the Claude session cost as a comment on that PR (reusable block).
  comment-cost:
    name: Comment session cost
    needs: [implement, open-pr]
    if: success() && needs.open-pr.outputs.pr != ''
    permissions:
      pull-requests: write
    uses: ./.github/workflows/reusable-pr-comment.yml
    with:
      pr_number: ${{ needs.open-pr.outputs.pr }}
      body: |
        ### 🤖 Auto-maintain — session cost

        | Metric | Value |
        |--------|-------|
        | Cost (USD) | $${{ needs.implement.outputs.cost_usd }} |
        | Turns | ${{ needs.implement.outputs.num_turns }} |
        | Issue | #${{ github.event.issue.number || inputs.issue_number }} |
        | Model | claude-sonnet-4-6 |

        [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

  # Single outcome notification (skip when the label didn't match / nothing ran).
  notify:
    name: Notify outcome
    needs: implement
    if: always() && needs.implement.result != 'skipped'
    uses: ./.github/workflows/reusable-notify.yml
    with:
      status: ${{ needs.implement.result == 'success' && 'success' || 'failure' }}
      context: "Auto-maintain"
      success_message: "An issue was implemented on a branch and a PR is ready for review."
      failure_message: "Implementing an issue failed. Check the workflow run logs."
    secrets: inherit
